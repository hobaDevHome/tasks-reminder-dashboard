<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تحديث المهام</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --surface2: #21262d;
        --border: #30363d;
        --accent: #2f81f7;
        --done: #3fb950;
        --warning: #d29922;
        --danger: #f85149;
        --text: #e6edf3;
        --text-muted: #8b949e;
        --text-dim: #6e7681;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .nav-btn {
        padding: 0.3rem 0.8rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text-muted);
        font-family: "Cairo", sans-serif;
        font-size: 0.78rem;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: all 0.15s;
      }
      .nav-btn:hover {
        border-color: var(--accent);
        color: var(--text);
      }

      body {
        font-family: "Cairo", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 1.5rem 1rem 3rem;
      }

      .container {
        max-width: 680px;
        margin: 0 auto;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.8rem 1rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 1rem;
      }
      .header-title {
        font-size: 0.95rem;
        font-weight: 600;
      }

      .date-btn {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.25rem 0.7rem;
        cursor: pointer;
        transition: border-color 0.15s;
        color: var(--text-muted);
        font-family: "Cairo", sans-serif;
        font-size: 0.8rem;
      }
      .date-btn:hover {
        border-color: var(--accent);
        color: var(--text);
      }
      .date-btn .icon {
        font-size: 0.9rem;
      }

      .local-badge {
        display: inline-block;
        background: rgba(210, 153, 34, 0.15);
        border: 1px solid rgba(210, 153, 34, 0.4);
        color: var(--warning);
        font-size: 0.68rem;
        padding: 0.12rem 0.45rem;
        border-radius: 4px;
        margin-left: 0.4rem;
        vertical-align: middle;
      }

      /* Calendar dropdown */
      .calendar-dropdown {
        position: relative;
        margin-bottom: 1rem;
      }

      .calendar-panel {
        display: none;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.9rem 1rem;
        animation: fadeDown 0.15s ease;
      }

      .calendar-panel.open {
        display: block;
      }

      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .cal-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.7rem;
      }

      .cal-nav button {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text-muted);
        border-radius: 6px;
        width: 28px;
        height: 28px;
        cursor: pointer;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          color 0.12s,
          border-color 0.12s;
      }
      .cal-nav button:hover {
        color: var(--text);
        border-color: var(--accent);
      }
      .cal-month {
        font-size: 0.88rem;
        font-weight: 600;
      }

      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 2px;
      }

      .cal-day-name {
        text-align: center;
        font-size: 0.63rem;
        color: var(--text-dim);
        padding: 0.2rem 0;
      }

      .cal-day {
        text-align: center;
        padding: 0.3rem 0;
        font-size: 0.78rem;
        border-radius: 6px;
        cursor: pointer;
        color: var(--text-muted);
        transition: all 0.1s;
        border: 1px solid transparent;
      }
      .cal-day:hover:not(.empty):not(.selected) {
        background: var(--surface2);
        color: var(--text);
      }
      .cal-day.empty {
        cursor: default;
      }
      .cal-day.selected {
        background: var(--accent);
        color: white;
        font-weight: 600;
      }
      .cal-day.today:not(.selected) {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* Tasks */
      .tasks-list {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        margin-bottom: 1rem;
      }

      .task-row {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        transition: border-color 0.15s;
      }
      .task-row:hover {
        border-color: rgba(47, 129, 247, 0.35);
      }

      .task-main {
        display: grid;
        grid-template-columns: 22px 1fr auto;
        align-items: center;
        gap: 0.7rem;
        padding: 0.65rem 0.9rem;
      }

      .task-num {
        width: 22px;
        height: 22px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.67rem;
        color: var(--text-dim);
        flex-shrink: 0;
      }

      .task-info {
        min-width: 0;
        cursor: pointer;
      }
      .task-name {
        font-size: 0.86rem;
        font-weight: 500;
        color: var(--text);
        line-height: 1.35;
      }
      .task-person {
        font-size: 0.71rem;
        color: var(--text-dim);
        margin-top: 0.08rem;
      }

      .status-pills {
        display: flex;
        gap: 0.25rem;
        flex-shrink: 0;
      }

      .pill {
        padding: 0.18rem 0.55rem;
        border-radius: 20px;
        border: 1px solid var(--border);
        font-size: 0.69rem;
        cursor: pointer;
        transition: all 0.12s;
        color: var(--text-dim);
        background: var(--surface2);
        white-space: nowrap;
        user-select: none;
      }
      .pill:hover {
        border-color: #58a6ff;
        color: var(--text);
      }
      .pill.s-done {
        background: rgba(63, 185, 80, 0.12);
        border-color: rgba(63, 185, 80, 0.5);
        color: var(--done);
      }
      .pill.s-progress {
        background: rgba(47, 129, 247, 0.12);
        border-color: rgba(47, 129, 247, 0.5);
        color: var(--accent);
      }
      .pill.s-blocked {
        background: rgba(248, 81, 73, 0.12);
        border-color: rgba(248, 81, 73, 0.5);
        color: var(--danger);
      }

      .task-details {
        display: none;
        flex-direction: column;
        gap: 0.6rem;
        padding: 0.7rem 0.9rem;
        border-top: 1px solid var(--border);
      }
      .task-details.open {
        display: flex;
      }

      .detail-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .detail-label {
        font-size: 0.72rem;
        color: var(--text-muted);
        width: 65px;
        flex-shrink: 0;
      }
      .progress-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex: 1;
      }

      input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        height: 4px;
        border-radius: 100px;
        background: var(--border);
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
      }
      .progress-num {
        font-size: 0.74rem;
        color: var(--accent);
        width: 28px;
        text-align: left;
      }

      textarea {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.45rem 0.65rem;
        color: var(--text);
        font-family: "Cairo", sans-serif;
        font-size: 0.8rem;
        resize: none;
        height: 52px;
        outline: none;
        direction: rtl;
        transition: border-color 0.15s;
      }
      textarea:focus {
        border-color: var(--accent);
      }
      textarea::placeholder {
        color: var(--text-dim);
      }

      .submit-btn {
        width: 100%;
        padding: 0.72rem;
        background: var(--accent);
        border: none;
        border-radius: 8px;
        color: white;
        font-family: "Cairo", sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .submit-btn:hover {
        opacity: 0.88;
      }
      .submit-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .spinner {
        display: inline-block;
        width: 13px;
        height: 13px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 0.3rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .success-screen {
        display: none;
        text-align: center;
        padding: 3rem 1rem;
      }
      .success-screen h2 {
        font-size: 1.1rem;
        color: var(--done);
        margin-bottom: 0.3rem;
      }
      .success-screen p {
        font-size: 0.84rem;
        color: var(--text-muted);
      }

      .state-msg {
        text-align: center;
        padding: 2rem;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      .state-msg.error {
        color: var(--danger);
      }
      .state-msg.empty {
        color: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <span class="header-title"> 📋 تحديث المهام </span>
        <button class="date-btn" onclick="toggleCalendar()">
          <span class="icon">📅</span>
          <span id="dateLabel">اختر تاريخ</span>
        </button>
        <a href="Dashboard.html" class="nav-btn">📊 الداشبورد</a>
      </div>

      <!-- Calendar dropdown -->
      <div class="calendar-dropdown">
        <div class="calendar-panel" id="calPanel">
          <div class="cal-nav">
            <button onclick="changeMonth(-1)">‹</button>
            <span class="cal-month" id="calMonth"></span>
            <button onclick="changeMonth(1)">›</button>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>
      </div>

      <div id="formSection">
        <div class="tasks-list" id="tasksContainer">
          <div class="state-msg">اضغط على 📅 لاختيار تاريخ الاجتماع</div>
        </div>
        <button
          class="submit-btn"
          id="submitBtn"
          onclick="handleSubmit()"
          style="display: none"
        >
          حفظ التحديثات
        </button>
      </div>

      <div class="success-screen" id="successScreen">
        <div style="font-size: 2.5rem; margin-bottom: 0.8rem">✅</div>
        <h2>تم الحفظ بنجاح!</h2>
        <p>شكراً، تم تحديث حالة المهام</p>
      </div>
    </div>
    <script>
      const WEBHOOK_GET_URL =
        "https://kaza-score.app.n8n.cloud/webhook/get-tasks";
      const WEBHOOK_POST_URL =
        "https://kaza-score.app.n8n.cloud/webhook/update-tasks";

      const DUMMY_DATA = {
        "21/04/2026": [
          {
            "Task Name": "مراجعة وتحديث ملف المتطلبات",
            "Responsible Person": "أحمد",
            "Email": "ahmed@test.com",
          },
          {
            "Task Name": "تصميم واجهة صفحة الدخول",
            "Responsible Person": "سارة",
            "Email": "sara@test.com",
          },
          {
            "Task Name": "إعداد بيئة الاختبار على السيرفر",
            "Responsible Person": "محمد",
            "Email": "mo@test.com",
          },
          {
            "Task Name": "كتابة تقرير الأداء الشهري",
            "Responsible Person": "دينا",
            "Email": "dina@test.com",
          },
        ],
        "20/04/2026": [
          {
            "Task Name": "متابعة العملاء وتحديث قاعدة البيانات",
            "Responsible Person": "كريم",
            "Email": "karim@test.com",
          },
          {
            "Task Name": "إعداد العرض التقديمي للإدارة",
            "Responsible Person": "منى",
            "Email": "mona@test.com",
          },
        ],
      };

      const isLocal =
        ["localhost", "127.0.0.1", ""].includes(window.location.hostname) ||
        window.location.protocol === "file:";

      if (isLocal)
        document.getElementById("localBadge").style.display = "inline-block";

      // ===== Calendar =====
      const MONTHS_AR = [
        "يناير",
        "فبراير",
        "مارس",
        "أبريل",
        "مايو",
        "يونيو",
        "يوليو",
        "أغسطس",
        "سبتمبر",
        "أكتوبر",
        "نوفمبر",
        "ديسمبر",
      ];
      const DAYS_AR = ["أح", "إث", "ثل", "أر", "خم", "جم", "سب"];

      const now = new Date();
      let calYear = now.getFullYear();
      let calMonth = now.getMonth();
      let selectedDate = "";

      // لو في date في الـ URL
      const urlDate = new URLSearchParams(window.location.search).get("date");
      if (urlDate) {
        const parts = urlDate.split("/");
        if (parts.length === 3) {
          calMonth = parseInt(parts[1]) - 1;
          calYear = parseInt(parts[2]);
          selectedDate = urlDate;
          document.getElementById("dateLabel").textContent = urlDate;
        }
      }

      function toggleCalendar() {
        const panel = document.getElementById("calPanel");
        panel.classList.toggle("open");
        if (panel.classList.contains("open")) renderCalendar();
      }

      function renderCalendar() {
        document.getElementById("calMonth").textContent =
          `${MONTHS_AR[calMonth]} ${calYear}`;
        const grid = document.getElementById("calGrid");
        grid.innerHTML = "";

        DAYS_AR.forEach((d) => {
          const el = document.createElement("div");
          el.className = "cal-day-name";
          el.textContent = d;
          grid.appendChild(el);
        });

        const firstDay = new Date(calYear, calMonth, 1).getDay();
        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        const todayStr = formatDate(now);

        for (let i = 0; i < firstDay; i++) {
          const el = document.createElement("div");
          el.className = "cal-day empty";
          grid.appendChild(el);
        }

        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = formatDate(new Date(calYear, calMonth, d));
          const el = document.createElement("div");
          el.className = "cal-day";
          el.textContent = d;
          if (dateStr === todayStr) el.classList.add("today");
          if (dateStr === selectedDate) el.classList.add("selected");
          el.onclick = () => selectDate(dateStr);
          grid.appendChild(el);
        }
      }

      function formatDate(d) {
        const dd = String(d.getDate()).padStart(2, "0");
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        return `${dd}/${mm}/${d.getFullYear()}`;
      }

      function changeMonth(dir) {
        calMonth += dir;
        if (calMonth > 11) {
          calMonth = 0;
          calYear++;
        }
        if (calMonth < 0) {
          calMonth = 11;
          calYear--;
        }
        renderCalendar();
      }

      function selectDate(dateStr) {
        selectedDate = dateStr;
        document.getElementById("dateLabel").textContent = dateStr;
        document.getElementById("calPanel").classList.remove("open");
        loadTasks(dateStr);
      }

      // ===== Tasks =====
      let tasks = [];
      let states = [];

      async function loadTasks(date) {
        const container = document.getElementById("tasksContainer");
        const submitBtn = document.getElementById("submitBtn");
        container.innerHTML = '<div class="state-msg">جاري التحميل...</div>';
        submitBtn.style.display = "none";

        try {
          let raw;
          if (isLocal) {
            await new Promise((r) => setTimeout(r, 300));
            raw = DUMMY_DATA[date] || [];
          } else {
            const res = await fetch(
              `${WEBHOOK_GET_URL}?date=${encodeURIComponent(date)}`,
            );
            const data = await res.json();
            raw = data[0]?.data || data || [];
          }

          if (!raw.length) {
            container.innerHTML =
              '<div class="state-msg empty">📭 لا توجد مهام لهذا التاريخ</div>';
            return;
          }

          tasks = raw.map((r) => ({
            task_name: r["Task Name"] || r.task_name || "",
            responsible_person:
              r["Responsible Person"] || r.responsible_person || "",
            email: r["Email"] || r.email || "",
            current_status: r["Status"] || "قيد التنفيذ",
            current_progress: +r["progress"] || 0,
            current_obstacle: r["obstacle"] || "",
          }));
          states = tasks.map((t) => ({
            status: t.current_status,
            progress: t.current_progress,
            obstacle: t.current_obstacle,
          }));
          buildForm();
          submitBtn.style.display = "block";
        } catch (e) {
          container.innerHTML =
            '<div class="state-msg error">حدث خطأ في تحميل المهام</div>';
        }
      }

      function buildForm() {
        const c = document.getElementById("tasksContainer");
        c.innerHTML = "";
        tasks.forEach((t, i) => {
          const s = states[i].status;
          const pp = s === "قيد التنفيذ" ? "s-progress" : "";
          const pd = s === "مكتملة" ? "s-done" : "";
          const pb = s === "متوقفة" ? "s-blocked" : "";
          const detOpen = s !== "مكتملة" ? "open" : "";
          const obsDisplay = s === "متوقفة" ? "flex" : "none";
          const progVal = states[i].progress;
          const obsVal = states[i].obstacle;

          const div = document.createElement("div");
          div.className = "task-row";
          div.innerHTML = `
        <div class="task-main">
          <div class="task-num">${i + 1}</div>
          <div class="task-info" onclick="toggleDetails(${i})">
            <div class="task-name">${t.task_name}</div>
            <div class="task-person">👤 ${t.responsible_person}</div>
          </div>
          <div class="status-pills">
            <span class="pill ${pp}" id="pp-${i}" onclick="setStatus(event,${i},'قيد التنفيذ')">جارية</span>
            <span class="pill ${pd}" id="pd-${i}" onclick="setStatus(event,${i},'مكتملة')">✓ خلصت</span>
            <span class="pill ${pb}" id="pb-${i}" onclick="setStatus(event,${i},'متوقفة')">⛔ متوقفة</span>
          </div>
        </div>
        <div class="task-details ${detOpen}" id="det-${i}">
          <div class="detail-row">
            <span class="detail-label">نسبة الإنجاز</span>
            <div class="progress-wrap">
              <input type="range" min="0" max="100" value="${progVal}" id="prg-${i}"
                oninput="document.getElementById('prn-${i}').textContent=this.value+'%';states[${i}].progress=+this.value">
              <span class="progress-num" id="prn-${i}">${progVal}%</span>
            </div>
          </div>
          <div class="detail-row" id="obs-row-${i}" style="display:${obsDisplay}">
            <span class="detail-label">سبب التوقف</span>
            <textarea id="obs-${i}" placeholder="اذكر سبب التوقف..."
              oninput="states[${i}].obstacle=this.value">${obsVal}</textarea>
          </div>
        </div>
      `;
          c.appendChild(div);
        });
      }

      function toggleDetails(i) {
        document.getElementById(`det-${i}`).classList.toggle("open");
      }

      function setStatus(e, i, status) {
        e.stopPropagation();
        states[i].status = status;
        ["pp", "pd", "pb"].forEach(
          (p) => (document.getElementById(`${p}-${i}`).className = "pill"),
        );
        const obsRow = document.getElementById(`obs-row-${i}`);
        const det = document.getElementById(`det-${i}`);
        if (status === "مكتملة") {
          document.getElementById(`pd-${i}`).className = "pill s-done";
          det.classList.remove("open");
          obsRow.style.display = "none";
        } else if (status === "قيد التنفيذ") {
          document.getElementById(`pp-${i}`).className = "pill s-progress";
          det.classList.add("open");
          obsRow.style.display = "none";
        } else {
          document.getElementById(`pb-${i}`).className = "pill s-blocked";
          det.classList.add("open");
          obsRow.style.display = "flex";
        }
      }

      async function handleSubmit() {
        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> جاري الحفظ...';

        const updates = tasks.map((t, i) => ({
          task_name: t.task_name,
          responsible_person: t.responsible_person,
          email: t.email,
          meeting_date: selectedDate,
          status: states[i].status,
          progress:
            states[i].status === "مكتملة" ? "100" : String(states[i].progress),
          obstacle: states[i].obstacle,
        }));

        try {
          if (!isLocal) {
            await fetch(WEBHOOK_POST_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ updates }),
            });
          } else {
            console.log("Local test — updates:", updates);
            await new Promise((r) => setTimeout(r, 600));
          }
          document.getElementById("formSection").style.display = "none";
          document.getElementById("successScreen").style.display = "block";
        } catch (err) {
          btn.disabled = false;
          btn.innerHTML = "حفظ التحديثات";
          alert("حدث خطأ، يرجى المحاولة مرة أخرى");
        }
      }

      // Init — لو في تاريخ في الـ URL حمل المهام تلقائي
      if (selectedDate) loadTasks(selectedDate);
    </script>
  </body>
