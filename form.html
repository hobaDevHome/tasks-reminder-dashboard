<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تحديث المهام</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0e1a;
        --surface: #111827;
        --surface2: #1a2236;
        --border: #1e2d4a;
        --accent: #3b82f6;
        --accent2: #06b6d4;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --text: #f1f5f9;
        --text-muted: #64748b;
        --text-dim: #94a3b8;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Cairo", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 2rem 1rem;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        top: -50%;
        right: -20%;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(59, 130, 246, 0.08) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      body::after {
        content: "";
        position: fixed;
        bottom: -30%;
        left: -10%;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.06) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      .container {
        max-width: 720px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }

      .header {
        text-align: center;
        margin-bottom: 2.5rem;
        animation: fadeDown 0.6s ease;
      }

      .header-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(59, 130, 246, 0.1);
        border: 1px solid rgba(59, 130, 246, 0.2);
        border-radius: 100px;
        padding: 0.4rem 1.2rem;
        font-size: 0.8rem;
        color: var(--accent2);
        margin-bottom: 1rem;
        letter-spacing: 0.05em;
      }

      .header h1 {
        font-family: "Tajawal", sans-serif;
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(135deg, #f1f5f9, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.5rem;
      }

      .header p {
        color: var(--text-muted);
        font-size: 0.95rem;
        font-weight: 300;
      }

      .meeting-info {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.2rem 1.5rem;
        margin-bottom: 2rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        animation: fadeUp 0.6s ease 0.1s both;
      }

      .meeting-icon {
        width: 44px;
        height: 44px;
        background: linear-gradient(
          135deg,
          rgba(59, 130, 246, 0.2),
          rgba(6, 182, 212, 0.2)
        );
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        flex-shrink: 0;
      }

      .meeting-info-text small {
        color: var(--text-muted);
        font-size: 0.75rem;
        display: block;
        margin-bottom: 0.2rem;
      }

      .meeting-info-text strong {
        font-size: 1rem;
        color: var(--text);
      }

      .tasks-form {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
      }

      .task-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 1.5rem;
        transition:
          border-color 0.3s,
          transform 0.2s;
        animation: fadeUp 0.6s ease both;
        position: relative;
        overflow: hidden;
      }

      .task-card::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 4px;
        height: 100%;
        background: linear-gradient(180deg, var(--accent), var(--accent2));
        border-radius: 0 20px 20px 0;
      }

      .task-card:hover {
        border-color: rgba(59, 130, 246, 0.3);
        transform: translateY(-2px);
      }

      .task-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.2rem;
      }

      .task-number {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        font-weight: 700;
        flex-shrink: 0;
      }

      .task-info h3 {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 0.3rem;
        line-height: 1.4;
      }

      .task-info .responsible {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: rgba(6, 182, 212, 0.1);
        border: 1px solid rgba(6, 182, 212, 0.2);
        border-radius: 100px;
        padding: 0.2rem 0.8rem;
        font-size: 0.78rem;
        color: var(--accent2);
      }

      .field-group {
        margin-bottom: 1rem;
      }

      .field-label {
        display: block;
        font-size: 0.82rem;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
        font-weight: 500;
      }

      .status-options {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }

      .status-option {
        position: relative;
      }

      .status-option input[type="radio"] {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
      }

      .status-option label {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.5rem 1rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface2);
        cursor: pointer;
        font-size: 0.85rem;
        color: var(--text-dim);
        transition: all 0.2s;
        white-space: nowrap;
      }

      .status-option input[type="radio"]:checked + label {
        border-color: var(--accent);
        background: rgba(59, 130, 246, 0.1);
        color: var(--text);
      }

      .status-option.done input[type="radio"]:checked + label {
        border-color: var(--success);
        background: rgba(16, 185, 129, 0.1);
        color: var(--success);
      }

      .status-option.inprogress input[type="radio"]:checked + label {
        border-color: var(--warning);
        background: rgba(245, 158, 11, 0.1);
        color: var(--warning);
      }

      .status-option.blocked input[type="radio"]:checked + label {
        border-color: var(--danger);
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
      }

      .extra-fields {
        display: none;
        flex-direction: column;
        gap: 1rem;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
      }

      .extra-fields.visible {
        display: flex;
        animation: fadeUp 0.3s ease;
      }

      .progress-field {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .progress-slider {
        flex: 1;
        -webkit-appearance: none;
        height: 6px;
        border-radius: 100px;
        background: var(--border);
        outline: none;
        cursor: pointer;
      }

      .progress-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        cursor: pointer;
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
      }

      .progress-value {
        width: 48px;
        text-align: center;
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--accent2);
        background: rgba(6, 182, 212, 0.1);
        border-radius: 8px;
        padding: 0.3rem;
      }

      textarea {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.8rem 1rem;
        color: var(--text);
        font-family: "Cairo", sans-serif;
        font-size: 0.9rem;
        resize: vertical;
        min-height: 80px;
        transition: border-color 0.2s;
        outline: none;
        direction: rtl;
      }

      textarea:focus {
        border-color: var(--accent);
      }

      textarea::placeholder {
        color: var(--text-muted);
      }

      .submit-section {
        margin-top: 1.5rem;
        animation: fadeUp 0.6s ease 0.4s both;
      }

      .submit-btn {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border: none;
        border-radius: 14px;
        color: white;
        font-family: "Cairo", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
      }

      .submit-btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        transition: left 0.5s;
      }

      .submit-btn:hover::before {
        left: 100%;
      }

      .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(59, 130, 246, 0.35);
      }

      .submit-btn:active {
        transform: translateY(0);
      }

      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .success-screen {
        display: none;
        text-align: center;
        padding: 4rem 2rem;
        animation: fadeUp 0.6s ease;
      }

      .success-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(
          135deg,
          rgba(16, 185, 129, 0.2),
          rgba(6, 182, 212, 0.2)
        );
        border: 2px solid var(--success);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        margin: 0 auto 1.5rem;
        animation: pulse 2s infinite;
      }

      .success-screen h2 {
        font-size: 1.5rem;
        color: var(--success);
        margin-bottom: 0.5rem;
      }

      .success-screen p {
        color: var(--text-muted);
        font-size: 0.95rem;
      }

      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.3);
        }
        50% {
          box-shadow: 0 0 0 12px rgba(16, 185, 129, 0);
        }
      }

      .loading-spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-left: 0.5rem;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="header-badge">📋 تحديث المهام</div>
        <h1>متابعة تقدم المهام</h1>
        <p>يرجى تحديث حالة كل مهمة من المهام المسندة إليك</p>
      </div>

      <div class="meeting-info">
        <div class="meeting-icon">📅</div>
        <div class="meeting-info-text">
          <small>اجتماع بتاريخ</small>
          <strong id="meetingDateDisplay">جاري التحميل...</strong>
        </div>
      </div>

      <div id="formSection">
        <form class="tasks-form" id="tasksForm">
          <div id="tasksContainer"></div>
          <div class="submit-section">
            <button type="submit" class="submit-btn" id="submitBtn">
              حفظ التحديثات
            </button>
          </div>
        </form>
      </div>

      <div class="success-screen" id="successScreen">
        <div class="success-icon">✓</div>
        <h2>تم الحفظ بنجاح!</h2>
        <p>شكراً لك، تم تحديث حالة المهام بنجاح</p>
      </div>
    </div>

    <script>
      // ===== CONFIG =====
      const WEBHOOK_GET_URL =
        "https://kaza-score.app.n8n.cloud/webhook/get-tasks";
      const WEBHOOK_POST_URL =
        "https://kaza-score.app.n8n.cloud/webhook/update-tasks";

      // استخراج التاريخ من الـ URL
      const params = new URLSearchParams(window.location.search);
      const meetingDate = params.get("date") || "";

      // عرض تاريخ الاجتماع
      document.getElementById("meetingDateDisplay").textContent =
        meetingDate || "غير محدد";

      // جيب المهام من الـ Webhook
      let tasks = [];

      async function loadTasks() {
        try {
          const res = await fetch(
            `${WEBHOOK_GET_URL}?date=${encodeURIComponent(meetingDate)}`,
          );
          const data = await res.json();
          // الداتا جاية كـ array من objects
          tasks = data.map((item) => ({
            task_name: item["Task Name"] || item.task_name || "",
            responsible_person:
              item["Responsible Person"] || item.responsible_person || "",
            email: item["Email"] || item.email || "",
          }));
          buildForm();
        } catch (err) {
          document.getElementById("tasksContainer").innerHTML =
            '<p style="color:var(--danger);text-align:center">حدث خطأ في تحميل المهام</p>';
        }
      }

      loadTasks();

      // بناء الفورم
      const container = document.getElementById("tasksContainer");

      function buildForm() {
        container.innerHTML = "";
        tasks.forEach((task, index) => {
          const delay = (index * 0.1 + 0.2).toFixed(1);
          const card = document.createElement("div");
          card.className = "task-card";
          card.style.animationDelay = `${delay}s`;
          card.innerHTML = `
      <div class="task-header">
        <div class="task-number">${index + 1}</div>
        <div class="task-info" style="flex:1">
          <h3>${task.task_name}</h3>
          <span class="responsible">👤 ${task.responsible_person}</span>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">حالة المهمة</label>
        <div class="status-options">
          <div class="status-option done">
            <input type="radio" name="status_${index}" id="done_${index}" value="Done">
            <label for="done_${index}">✅ مكتملة</label>
          </div>
          <div class="status-option inprogress">
            <input type="radio" name="status_${index}" id="inprogress_${index}" value="قيد التنفيذ" checked>
            <label for="inprogress_${index}">🔄 قيد التنفيذ</label>
          </div>
          <div class="status-option blocked">
            <input type="radio" name="status_${index}" id="blocked_${index}" value="متوقفة">
            <label for="blocked_${index}">⛔ متوقفة</label>
          </div>
        </div>
      </div>

      <div class="extra-fields visible" id="extra_${index}">
        <div class="field-group">
          <label class="field-label">نسبة الإنجاز</label>
          <div class="progress-field">
            <input type="range" class="progress-slider" id="progress_${index}" 
              min="0" max="100" value="0" 
              oninput="document.getElementById('prog_val_${index}').textContent = this.value + '%'">
            <div class="progress-value" id="prog_val_${index}">0%</div>
          </div>
        </div>
        <div class="field-group" id="obstacle_group_${index}" style="display:none">
          <label class="field-label">سبب التوقف</label>
          <textarea id="obstacle_${index}" placeholder="اذكر سبب التوقف أو العائق..."></textarea>
        </div>
      </div>
    `;
          container.appendChild(card);

          // إظهار/إخفاء الحقول حسب الحالة
          card
            .querySelectorAll(`input[name="status_${index}"]`)
            .forEach((radio) => {
              radio.addEventListener("change", () => {
                const extra = document.getElementById(`extra_${index}`);
                const obstacleGroup = document.getElementById(
                  `obstacle_group_${index}`,
                );

                if (radio.value === "Done") {
                  extra.classList.remove("visible");
                } else {
                  extra.classList.add("visible");
                  obstacleGroup.style.display =
                    radio.value === "متوقفة" ? "block" : "none";
                }
              });
            });
        }); // end forEach
      } // end buildForm

      // إرسال الفورم
      document
        .getElementById("tasksForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const btn = document.getElementById("submitBtn");
          btn.disabled = true;
          btn.innerHTML = 'جاري الحفظ... <span class="loading-spinner"></span>';

          const updates = tasks.map((task, index) => {
            const status =
              document.querySelector(`input[name="status_${index}"]:checked`)
                ?.value || "قيد التنفيذ";
            const progress =
              status === "Done"
                ? "100"
                : document.getElementById(`progress_${index}`)?.value || "0";
            const obstacle =
              document.getElementById(`obstacle_${index}`)?.value || "";

            return {
              task_name: task.task_name,
              responsible_person: task.responsible_person,
              email: task.email,
              meeting_date: meetingDate,
              status,
              progress,
              obstacle,
            };
          });

          try {
            await fetch(WEBHOOK_POST_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ updates }),
            });

            document.getElementById("formSection").style.display = "none";
            document.getElementById("successScreen").style.display = "block";
          } catch (err) {
            btn.disabled = false;
            btn.innerHTML = "حفظ التحديثات";
            alert("حدث خطأ، يرجى المحاولة مرة أخرى");
          }
        });
    </script>
  </body>
</html>
