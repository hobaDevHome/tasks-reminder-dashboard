<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>داشبورد المهام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
      :root {
        --bg: #f0f2f8;
        --surface: #ffffff;
        --surface2: #f5f7fc;
        --border: #e4e8f0;
        --accent: #4361ee;
        --accent-soft: #eef1fd;
        --done: #10b981;
        --done-soft: #ecfdf5;
        --warning: #f59e0b;
        --warning-soft: #fffbeb;
        --danger: #ef4444;
        --danger-soft: #fef2f2;
        --text: #1e2746;
        --text-muted: #6b7a99;
        --text-dim: #9aa5be;
        --shadow: 0 1px 3px rgba(30,39,70,0.06), 0 4px 16px rgba(30,39,70,0.07);
        --shadow-sm: 0 1px 2px rgba(30,39,70,0.05), 0 2px 8px rgba(30,39,70,0.05);
        --radius: 14px;
        --radius-sm: 8px;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: "Cairo", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* ── Main layout ── */
      .main {
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Top header ── */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 2rem;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 50;
      }

      .topbar-left {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .company-name {
        font-size: 0.68rem;
        font-weight: 600;
        color: var(--text-dim);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      /* ── Company Logo ── */
      .company-logo {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .logo-icon {
        width: 32px; height: 32px;
        background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
      }
      .logo-icon svg { width: 18px; height: 18px; fill: white; }
      .logo-text {
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.02em;
      }
      .logo-text span { color: var(--accent); }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.82rem;
        color: var(--text-muted);
        margin-top: 2px;
      }
      .breadcrumb strong { color: var(--text); font-weight: 600; }
      .breadcrumb-sep { color: var(--text-dim); font-size: 0.7rem; }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }



      /* ── Page content ── */
      .page {
        padding: 2rem;
        flex: 1;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
      }

      .page-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 1.75rem;
      }

      .page-title {
        font-size: 1.4rem;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.02em;
      }
      .page-subtitle {
        font-size: 0.82rem;
        color: var(--text-muted);
        margin-top: 0.2rem;
      }

      .header-actions {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      .btn {
        padding: 0.45rem 1rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        font-family: "Cairo", sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        transition: all 0.15s;
        box-shadow: var(--shadow-sm);
      }
      .btn:hover { border-color: var(--accent); color: var(--accent); }
      .btn-primary {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        box-shadow: 0 2px 8px rgba(67,97,238,0.25);
      }
      .btn-primary:hover { background: #3451d1; border-color: #3451d1; color: white; opacity: 1; }

      /* ── Filter pills ── */
      .filters {
        display: flex;
        gap: 0.4rem;
        margin-bottom: 1.75rem;
        flex-wrap: wrap;
      }

      .filter-btn {
        padding: 0.35rem 1rem;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        font-family: "Cairo", sans-serif;
        font-size: 0.78rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        box-shadow: var(--shadow-sm);
      }
      .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
      .filter-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        box-shadow: 0 2px 8px rgba(67,97,238,0.22);
      }

      /* ── Stats grid ── */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.2rem 1.4rem;
        box-shadow: var(--shadow-sm);
        position: relative;
        overflow: hidden;
        transition: box-shadow 0.2s, transform 0.2s;
      }
      .stat-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }

      .stat-card::before {
        content: '';
        position: absolute;
        top: 0; right: 0;
        width: 4px;
        height: 100%;
        border-radius: 0 var(--radius) var(--radius) 0;
      }
      .stat-card.total::before { background: var(--text-dim); }
      .stat-card.done::before { background: var(--done); }
      .stat-card.progress::before { background: var(--accent); }
      .stat-card.blocked::before { background: var(--danger); }

      .stat-icon {
        width: 36px; height: 36px;
        border-radius: 9px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1rem;
        margin-bottom: 0.8rem;
      }
      .stat-card.total .stat-icon { background: #f1f3f9; }
      .stat-card.done .stat-icon { background: var(--done-soft); }
      .stat-card.progress .stat-icon { background: var(--accent-soft); }
      .stat-card.blocked .stat-icon { background: var(--danger-soft); }

      .stat-label {
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.4rem;
      }

      .stat-value {
        font-size: 2rem;
        font-weight: 800;
        line-height: 1;
        margin-bottom: 0.25rem;
        letter-spacing: -0.03em;
      }

      .stat-card.total .stat-value { color: var(--text); }
      .stat-card.done .stat-value { color: var(--done); }
      .stat-card.progress .stat-value { color: var(--accent); }
      .stat-card.blocked .stat-value { color: var(--danger); }

      .stat-sub {
        font-size: 0.72rem;
        color: var(--text-dim);
      }

      /* ── Charts grid ── */
      .charts-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .chart-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.4rem 1.5rem;
        box-shadow: var(--shadow-sm);
        transition: box-shadow 0.2s;
      }
      .chart-card:hover { box-shadow: var(--shadow); }

      .chart-card.full { grid-column: 1 / -1; }

      .chart-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.2rem;
      }

      .chart-title {
        font-size: 0.88rem;
        font-weight: 700;
        color: var(--text);
      }
      .chart-badge {
        font-size: 0.68rem;
        font-weight: 600;
        padding: 0.15rem 0.55rem;
        border-radius: 20px;
        background: var(--accent-soft);
        color: var(--accent);
      }

      .chart-wrap {
        position: relative;
        width: 100%;
      }

      /* ── Donut ── */
      .donut-wrap {
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }

      .donut-chart {
        position: relative;
        width: 130px;
        height: 130px;
        flex-shrink: 0;
      }

      .legend {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        flex: 1;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.8rem;
      }

      .legend-dot {
        width: 8px; height: 8px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      .legend-label { color: var(--text-muted); flex: 1; }
      .legend-value { color: var(--text); font-weight: 700; }

      /* ── Person progress ── */
      .person-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .person-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.4rem;
      }

      .person-name { font-size: 0.82rem; font-weight: 600; color: var(--text); }
      .person-stats { font-size: 0.7rem; color: var(--text-dim); }

      .progress-bar-wrap {
        background: var(--surface2);
        border-radius: 100px;
        height: 6px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        border-radius: 100px;
        transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ── Obstacles ── */
      .obstacle-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .obstacle-item {
        display: grid;
        grid-template-columns: 1fr auto auto;
        align-items: center;
        gap: 0.8rem;
        padding: 0.75rem 1rem;
        background: var(--surface2);
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        transition: border-color 0.15s;
      }
      .obstacle-item:hover { border-color: var(--danger); }

      .obstacle-task { font-size: 0.84rem; color: var(--text); font-weight: 500; }
      .obstacle-person { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }

      .obstacle-reason {
        font-size: 0.71rem;
        color: var(--danger);
        background: var(--danger-soft);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 6px;
        padding: 0.18rem 0.55rem;
        white-space: nowrap;
        font-weight: 600;
      }

      .empty-msg {
        text-align: center;
        padding: 2rem;
        color: var(--text-dim);
        font-size: 0.84rem;
      }

      .loading {
        text-align: center;
        padding: 4rem;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .section-label {
        font-size: 0.68rem;
        font-weight: 700;
        color: var(--text-dim);
        letter-spacing: 0.07em;
        text-transform: uppercase;
        margin-bottom: 0.75rem;
        padding-right: 0.2rem;
      }

      @media (max-width: 768px) {
        .stats-grid { grid-template-columns: repeat(2, 1fr); }
        .charts-grid { grid-template-columns: 1fr; }
        .chart-card.full { grid-column: 1; }
        .page { padding: 1rem; }
      }
    </style>
  </head>
  <body>

    <!-- Main -->
    <div class="main">

      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <div class="company-logo">
            <div class="logo-icon">
              <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <span class="logo-text">Quick<span>Score</span></span>
          </div>
          <div class="breadcrumb">
            <span>الرئيسية</span>
            <span class="breadcrumb-sep">›</span>
            <strong>داشبورد المهام</strong>
          </div>
        </div>

      </header>

      <!-- Page -->
      <div class="page">
        <div class="page-header">
          <div>
            <div class="page-title">نظرة عامة على المهام</div>
            <div class="page-subtitle">متابعة حالة المهام وأداء الفريق</div>
          </div>
          <div class="header-actions">
            <div class="filters" id="filters" style="margin-bottom:0;">
              <button class="filter-btn active" onclick="setFilter('all', this)">كل الوقت</button>
              <button class="filter-btn" onclick="setFilter('week', this)">آخر أسبوع</button>
              <button class="filter-btn" onclick="setFilter('month', this)">آخر شهر</button>
            </div>
            <a href="form.html" class="btn btn-primary">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              تحديث المهام
            </a>
          </div>
        </div>

        <div id="dashContent">
          <div class="loading">جاري تحميل البيانات...</div>
        </div>
      </div>
    </div>

    <script>
      const WEBHOOK_URL = "https://kaza-score.app.n8n.cloud/webhook/get-dashboard";

      let allTasks = [];
      let filteredTasks = [];
      let donutChart = null;
      let barChart = null;

      async function loadData() {
        try {
          const res = await fetch(WEBHOOK_URL);
          const data = await res.json();
          allTasks = data[0]?.data || data || [];
          applyFilter("all");
        } catch (e) {
          document.getElementById("dashContent").innerHTML =
            '<div class="loading" style="color:var(--danger)">حدث خطأ في تحميل البيانات</div>';
        }
      }

      function parseDate(str) {
        if (!str) return null;
        const [d, m, y] = str.split("/");
        return new Date(+y, +m - 1, +d);
      }

      function setFilter(type, btn) {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        applyFilter(type);
      }

      function applyFilter(type) {
        const now = new Date();
        if (type === "all") {
          filteredTasks = allTasks;
        } else if (type === "week") {
          const cutoff = new Date(now - 7 * 86400000);
          filteredTasks = allTasks.filter(t => { const d = parseDate(t["Meeting Date"]); return d && d >= cutoff; });
        } else if (type === "month") {
          const cutoff = new Date(now - 30 * 86400000);
          filteredTasks = allTasks.filter(t => { const d = parseDate(t["Meeting Date"]); return d && d >= cutoff; });
        }
        renderDash();
      }

      function renderDash() {
        const tasks = filteredTasks;
        const total = tasks.length;
        const done = tasks.filter(t => t["Status"] === "مكتملة").length;
        const inprog = tasks.filter(t => t["Status"] === "قيد التنفيذ").length;
        const blocked = tasks.filter(t => t["Status"] === "متوقفة").length;
        const pending = tasks.filter(t => t["Status"] === "للتنفيذ").length;
        const avgProg = total ? Math.round(tasks.reduce((s, t) => s + (+t["progress"] || 0), 0) / total) : 0;

        const personMap = {};
        tasks.forEach(t => {
          const p = t["Responsible Person"];
          if (!personMap[p]) personMap[p] = { total: 0, done: 0, progress: [] };
          personMap[p].total++;
          if (t["Status"] === "مكتملة") personMap[p].done++;
          personMap[p].progress.push(+t["progress"] || 0);
        });

        const persons = Object.entries(personMap).map(([name, s]) => ({
          name,
          total: s.total,
          done: s.done,
          avgProgress: Math.round(s.progress.reduce((a, b) => a + b, 0) / s.progress.length),
        })).sort((a, b) => b.done - a.done);

        const blocked_tasks = tasks.filter(t => t["Status"] === "متوقفة");

        document.getElementById("dashContent").innerHTML = `
          <div class="stats-grid">
            <div class="stat-card total">
              <div class="stat-icon">📋</div>
              <div class="stat-label">إجمالي المهام</div>
              <div class="stat-value">${total}</div>
              <div class="stat-sub">متوسط الإنجاز ${avgProg}%</div>
            </div>
            <div class="stat-card done">
              <div class="stat-icon">✅</div>
              <div class="stat-label">مكتملة</div>
              <div class="stat-value">${done}</div>
              <div class="stat-sub">${total ? Math.round((done / total) * 100) : 0}% من الإجمالي</div>
            </div>
            <div class="stat-card progress">
              <div class="stat-icon">🔄</div>
              <div class="stat-label">قيد التنفيذ</div>
              <div class="stat-value">${inprog}</div>
              <div class="stat-sub">${total ? Math.round((inprog / total) * 100) : 0}% من الإجمالي</div>
            </div>
            <div class="stat-card blocked">
              <div class="stat-icon">⛔</div>
              <div class="stat-label">متوقفة</div>
              <div class="stat-value">${blocked}</div>
              <div class="stat-sub">${total ? Math.round((blocked / total) * 100) : 0}% من الإجمالي</div>
            </div>
          </div>

          <div class="charts-grid">
            <div class="chart-card">
              <div class="chart-header">
                <span class="chart-title">توزيع الحالات</span>
                <span class="chart-badge">${total} مهمة</span>
              </div>
              <div class="donut-wrap">
                <div class="donut-chart">
                  <canvas id="donutChart"></canvas>
                </div>
                <div class="legend">
                  <div class="legend-item">
                    <div class="legend-dot" style="background:#10b981"></div>
                    <span class="legend-label">مكتملة</span>
                    <span class="legend-value">${done}</span>
                  </div>
                  <div class="legend-item">
                    <div class="legend-dot" style="background:#4361ee"></div>
                    <span class="legend-label">قيد التنفيذ</span>
                    <span class="legend-value">${inprog}</span>
                  </div>
                  <div class="legend-item">
                    <div class="legend-dot" style="background:#ef4444"></div>
                    <span class="legend-label">متوقفة</span>
                    <span class="legend-value">${blocked}</span>
                  </div>
                  <div class="legend-item">
                    <div class="legend-dot" style="background:#9aa5be"></div>
                    <span class="legend-label">للتنفيذ</span>
                    <span class="legend-value">${pending}</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="chart-card">
              <div class="chart-header">
                <span class="chart-title">إنجاز الأفراد</span>
              </div>
              <div class="person-list" id="personList"></div>
            </div>

            <div class="chart-card full">
              <div class="chart-header">
                <span class="chart-title">نسبة إنجاز كل شخص</span>
              </div>
              <div class="chart-wrap" style="height:${Math.max(persons.length * 44 + 60, 200)}px">
                <canvas id="barChart"></canvas>
              </div>
            </div>

            <div class="chart-card full">
              <div class="chart-header">
                <span class="chart-title">المهام المتوقفة</span>
                <span class="chart-badge" style="background:var(--danger-soft);color:var(--danger);">${blocked_tasks.length} مهمة</span>
              </div>
              <div id="obstacleList"></div>
            </div>
          </div>
        `;

        // Donut
        if (donutChart) donutChart.destroy();
        donutChart = new Chart(document.getElementById("donutChart"), {
          type: "doughnut",
          data: {
            labels: ["مكتملة", "قيد التنفيذ", "متوقفة", "للتنفيذ"],
            datasets: [{
              data: [done, inprog, blocked, pending],
              backgroundColor: ["#10b981", "#4361ee", "#ef4444", "#9aa5be"],
              borderWidth: 3,
              borderColor: "#ffffff",
              hoverOffset: 4,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: "74%",
            plugins: { legend: { display: false }, tooltip: { rtl: true } },
          },
        });

        // Person bars
        const pList = document.getElementById("personList");
        if (!persons.length) {
          pList.innerHTML = '<div class="empty-msg">لا توجد بيانات</div>';
        } else {
          pList.innerHTML = persons.map(p => `
            <div class="person-row">
              <div class="person-header">
                <span class="person-name">${p.name}</span>
                <span class="person-stats">${p.done}/${p.total} مكتملة · ${p.avgProgress}%</span>
              </div>
              <div class="progress-bar-wrap">
                <div class="progress-bar-fill" style="width:${p.total ? Math.round((p.done / p.total) * 100) : 0}%;background:${p.done === p.total ? "#10b981" : "#4361ee"}"></div>
              </div>
            </div>
          `).join("");
        }

        // Bar chart
        if (barChart) barChart.destroy();
        barChart = new Chart(document.getElementById("barChart"), {
          type: "bar",
          data: {
            labels: persons.map(p => p.name),
            datasets: [{
              label: "نسبة الإنجاز %",
              data: persons.map(p => p.avgProgress),
              backgroundColor: persons.map(p =>
                p.avgProgress === 100 ? "#10b981" : p.avgProgress > 50 ? "#4361ee" : "#f59e0b"
              ),
              borderRadius: 6,
              borderSkipped: false,
            }],
          },
          options: {
            indexAxis: "y",
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { rtl: true } },
            scales: {
              x: {
                min: 0, max: 100,
                ticks: { color: "#9aa5be", callback: v => v + "%" },
                grid: { color: "#f0f2f8" },
                border: { color: "#e4e8f0" },
              },
              y: {
                ticks: { color: "#1e2746", font: { family: "Cairo", size: 12, weight: "600" } },
                grid: { display: false },
                border: { display: false },
              },
            },
          },
        });

        // Obstacles
        const oList = document.getElementById("obstacleList");
        if (!blocked_tasks.length) {
          oList.innerHTML = '<div class="empty-msg">✅ لا توجد مهام متوقفة حالياً</div>';
        } else {
          oList.innerHTML = `<div class="obstacle-list">${blocked_tasks.map(t => `
            <div class="obstacle-item">
              <span class="obstacle-task">${t["Task Name"]}</span>
              <span class="obstacle-person">👤 ${t["Responsible Person"]}</span>
              <span class="obstacle-reason">${t["obstacle"] || "لم يذكر سبب"}</span>
            </div>
          `).join("")}</div>`;
        }
      }

      loadData();
    </script>
  </body>
</html>
